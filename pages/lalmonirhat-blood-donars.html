<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Society of Lalmonirhat 💕</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; background-color: #fffafc; }
        .bg-blood { background-color: #dc2626; }
        .text-blood { color: #dc2626; }
        .bg-bloodLight { background-color: #fee2e2; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body class="min-h-screen pb-12">

    <header class="border-b border-gray-100 bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-6xl">
            <a href="blood-donors.html" class="flex items-center gap-2 text-gray-700 hover:text-blood transition font-semibold text-sm">
                <span>⬅️</span> মূল রক্তদাতা তালিকায় ফিরুন
            </a>
        </div>
    </header>

    <section class="container mx-auto px-4 pt-12 pb-8 max-w-4xl text-center">
        <div class="w-28 h-28 bg-white rounded-full mx-auto mb-6 flex items-center justify-center shadow-lg border-4 border-red-50 overflow-hidden transform hover:scale-105 transition duration-300">
            <img src="../assets/images/lalmonirhat-logo.jpg" alt="Lalmonirhat Blood Bank Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 tracking-tight">
            Blood Donation Society of Lalmonirhat 💕
        </h1>
        <p class="text-sm md:text-base text-gray-500 mt-3 font-noto max-w-xl mx-auto leading-relaxed">
            জরুরি মুহূর্তে লালমনিরহাট ও এর আশেপাশের এলাকায় স্বেচ্ছায় রক্তদানে প্রস্তুত রক্তদাতাদের তালিকা।
        </p>
    </section>

    <section class="container mx-auto px-4 mb-10 max-w-5xl">
        <div class="bg-white/90 border border-gray-100 rounded-2xl p-3 shadow-sm max-w-3xl mx-auto flex flex-wrap gap-1.5 justify-center" id="filterContainer">
            <button class="filter-btn bg-blood text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-sm transition" data-filter="All">All</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="A+">A+</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="B+">B+</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="O+">O+</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="AB+">AB+</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="AB-">AB-</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="A-">A-</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="B-">B-</button>
            <button class="filter-btn text-gray-600 hover:bg-gray-50 text-xs font-bold px-4 py-2.5 rounded-xl transition" data-filter="O-">O-</button>
        </div>
    </section>

    <main class="container mx-auto px-4 max-w-6xl">
        <div id="donorGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <p class="col-span-full text-center text-gray-500 py-10">লোডিং হচ্ছে...</p>
        </div>
    </main>

    <script>
        // আপনার Firebase Config এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyCOAQ4neajNgwUDUHl_9w08iN9J_qpkjfM",
  authDomain: "lalmonirhat-blood-doners.firebaseapp.com",
  projectId: "lalmonirhat-blood-doners",
  storageBucket: "lalmonirhat-blood-doners.firebasestorage.app",
  messagingSenderId: "74497582566",
  appId: "1:74497582566:web:82d3f786dc5e955a1ea227"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const donorGrid = document.getElementById('donorGrid');

        // Fetch Donors from Firebase
        db.ref('donors').on('value', (snapshot) => {
            donorGrid.innerHTML = ''; 
            
            if (!snapshot.exists()) {
                donorGrid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">কোনো ডোনার পাওয়া যায়নি!</p>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const donor = childSnapshot.val();
                
                // প্রোফাইল ছবির লজিক (লিংক থাকলে সেটা, না থাকলে ডেমো)
                const avatarUrl = donor.profileImage && donor.profileImage.trim() !== '' 
                                    ? donor.profileImage 
                                    : `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(donor.name)}`;
                
                // হোয়াটসঅ্যাপ নাম্বার ফরমেটিং (+88 যুক্ত করা)
                let waNumber = donor.whatsapp || donor.phone;
                waNumber = waNumber.startsWith('0') ? '88' + waNumber : waNumber;

                // ফেসবুক লিংকের টার্গেট লজিক
                const fbTarget = donor.fbLink === '#' ? '_self' : '_blank';

                const cardHTML = `
                <div class="donor-card bg-white border border-gray-100 rounded-2xl p-6 flex flex-col items-center text-center shadow-sm relative overflow-hidden group transition hover:shadow-md" data-group="${donor.bloodGroup}">
                    <div class="absolute top-0 right-0 bg-blood text-white font-bold text-xs px-3.5 py-1.5 rounded-bl-xl z-10">${donor.bloodGroup}</div>
                    
                    <div class="relative w-20 h-20 bg-gray-100 rounded-full mb-4 mt-2 border-4 border-white shadow-sm overflow-hidden z-10">
                        <img src="${avatarUrl}" alt="Profile" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="flex items-center justify-center gap-1 mb-1 z-10">
                        <h3 class="text-lg font-bold text-gray-800">${donor.name}</h3>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-blue-500" title="Verified Donor">
                            <path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.49 4.49 0 01-3.498-1.306 4.491 4.491 0 01-1.307-3.498A4.49 4.49 0 012.25 12c0-1.357.6-2.573 1.549-3.397a4.49 4.49 0 011.307-3.497 4.49 4.49 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    
                    <p class="text-xs text-gray-400 font-medium mb-3 z-10">📍 ${donor.location}</p>
                    
                    <div class="w-full bg-red-50/60 rounded-xl p-2.5 mb-5 border border-red-100/50 text-xs text-gray-600 z-10">
                        <div class="flex justify-between mb-1 pb-1 border-b border-red-100/40">
                            <span>🩸 মোট ডোনেট:</span> <span class="font-bold text-red-600">${donor.totalDonate} বার</span>
                        </div>
                        <div class="flex justify-between">
                            <span>📅 সর্বশেষ:</span> <span class="font-bold text-gray-700">${donor.lastDonate}</span>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 w-full z-10 mt-auto">
                        <a href="tel:${donor.phone}" class="flex-grow bg-bloodLight text-blood font-bold py-2.5 rounded-xl hover:bg-blood hover:text-white transition duration-300 flex items-center justify-center gap-1.5 shadow-sm border border-red-100 group/btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover/btn:animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                            কল
                        </a>
                        
                        <a href="https://wa.me/${waNumber}" target="_blank" class="w-10 h-10 shrink-0 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-500 hover:text-white transition duration-300 flex items-center justify-center shadow-sm border border-emerald-100" title="WhatsApp">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.884-4.434 9.886-9.885s-4.437-9.884-9.885-9.884c-5.45 0-9.884 4.434-9.887 9.884-.001 2.125.596 3.722 1.592 5.396l-1.002 3.664 3.804-1.003-.9-.236v.272zm11.238-6.142c-.272-.136-1.611-.796-1.861-.887-.251-.09-.434-.136-.618.136-.184.272-.702.887-.86 1.069-.158.182-.316.204-.588.068-.272-.136-1.151-.424-2.193-1.353-.811-.722-1.357-1.615-1.516-1.887-.158-.272-.017-.42.119-.556.121-.121.272-.318.408-.477.136-.159.181-.272.272-.454.091-.182.045-.341-.023-.477-.068-.136-.618-1.492-.847-2.045-.221-.531-.446-.459-.618-.468-.158-.008-.341-.008-.523-.008-.181 0-.476.068-.726.341-.25.272-.952.931-.952 2.27 0 1.339.975 2.632 1.111 2.814.136.182 1.916 2.925 4.641 4.103.649.28 1.156.447 1.55.572.652.207 1.246.177 1.714.107.525-.078 1.611-.659 1.838-1.294.227-.636.227-1.18.158-1.294-.068-.114-.25-.182-.522-.318z"/>
                            </svg>
                        </a>
                        
                        <a href="${donor.fbLink}" target="${fbTarget}" class="w-10 h-10 shrink-0 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition duration-300 flex items-center justify-center shadow-sm border border-blue-100" title="Facebook">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                        </a>
                    </div>
                </div>`;
                
                donorGrid.innerHTML += cardHTML;
            });

            // Re-initialize Filter Buttons logic
            setupFilters();
        });

        // Filtering Function
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const donorCards = document.querySelectorAll('.donor-card');

            filterBtns.forEach(btn => {
                // Remove old event listeners to prevent duplicate clicks
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-blood', 'text-white', 'shadow-sm');
                        b.classList.add('text-gray-600', 'hover:bg-gray-50');
                    });
                    
                    newBtn.classList.remove('text-gray-600', 'hover:bg-gray-50');
                    newBtn.classList.add('bg-blood', 'text-white', 'shadow-sm');

                    const filterValue = newBtn.getAttribute('data-filter');
                    
                    document.querySelectorAll('.donor-card').forEach(card => {
                        const bloodGroup = card.getAttribute('data-group');
                        if(filterValue === 'All' || filterValue === bloodGroup) {
                            card.style.display = 'flex'; 
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        }
    </script>
    <footer class="mt-12 py-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-400 font-noto">
            © ২০২৬ আমার বিদ্যানন্দ. সর্বস্বত্ব সংরক্ষিত। 
            <a href="admin_lalmonirhat-bloods.html" class="text-gray-300 hover:text-red-500 transition ml-2" title="Admin Login">
                🔒
            </a>
        </p>
    </footer>
</body>
</html>
