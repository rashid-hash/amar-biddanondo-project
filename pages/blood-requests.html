<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জরুরি রক্তের আবেদন | ধরলা ব্লাড ব্যাংক</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blood: '#E53935',
                        bloodLight: '#FFEBEE',
                    },
                    fontFamily: {
                        bengali: ['"Hind Siliguri"', 'sans-serif'],
                        noto: ['"Noto Sans Bengali"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body class="font-bengali bg-gray-50 text-gray-800 antialiased relative min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm border-b border-gray-100">
        <div class="flex items-center gap-3">
            <a href="blood-donors.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 w-10 h-10 rounded-full flex items-center justify-center transition duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h1 class="text-xl font-bold text-gray-800">রক্তের আবেদন বোর্ড</h1>
        </div>
        <button onclick="openRequestModal()" class="bg-blood text-white px-5 py-2.5 rounded-full text-sm font-bold shadow hover:bg-red-700 transition flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            আবেদন করুন
        </button>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-grow max-w-5xl">
        <div class="text-center mb-10">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">জরুরি রক্তের প্রয়োজন?</h2>
            <p class="text-gray-600 font-noto max-w-xl mx-auto">রোগীর জন্য জরুরি ভিত্তিতে রক্তের প্রয়োজন হলে ফর্মটি পূরণ করুন। আমাদের স্বেচ্ছাসেবকরা দ্রুত আপনার সাথে যোগাযোগ করার চেষ্টা করবেন।</p>
        </div>

        <!-- Blood Requests Grid -->
        <div id="requestGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Loading State -->
            <div class="col-span-full text-center py-10">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blood mb-2"></div>
                <p class="text-gray-500 font-noto">আবেদনগুলো লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <!-- ==========================================
         Blood Request Modal (Hidden by Default)
    ========================================== -->
    <div id="requestModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mt-10 mb-10 overflow-hidden">
            <div class="bg-blood px-6 py-4 flex justify-between items-center text-white">
                <h3 class="font-bold text-lg flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    নতুন রক্তের আবেদন
                </h3>
                <button onclick="closeRequestModal()" class="text-white hover:text-red-200 text-2xl font-bold">&times;</button>
            </div>
            
            <form id="bloodRequestForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Patient Name -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">রোগীর নাম *</label>
                        <input type="text" id="patientName" required placeholder="রোগীর পুরো নাম" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                    </div>
                    <!-- Blood Group -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">রক্তের গ্রুপ *</label>
                        <select id="bloodGroup" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                            <option value="">নির্বাচন করুন</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                    <!-- Blood Amount -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">রক্তের পরিমাণ *</label>
                        <input type="text" id="bloodAmount" required placeholder="যেমন: ২ ব্যাগ" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                    </div>
                    <!-- Date & Time -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">কবে ও কখন লাগবে? *</label>
                        <input type="text" id="dateTime" required placeholder="যেমন: ২০ জুন, বিকেল ৪টা" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                    </div>
                </div>

                <!-- Disease -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">রোগের নাম বা সমস্যা *</label>
                    <input type="text" id="disease" required placeholder="যেমন: সিজার, ডেঙ্গু, এক্সিডেন্ট" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                </div>
                
                <!-- Hospital Location -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">হাসপাতালের নাম ও ঠিকানা *</label>
                    <input type="text" id="hospitalName" required placeholder="যেমন: কুড়িগ্রাম সদর হাসপাতাল" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                </div>

                <!-- Contact Phone -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">যোগাযোগের মোবাইল নাম্বার *</label>
                    <input type="tel" id="contactPhone" required placeholder="01XXXXXXXXX" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blood">
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-blood text-white font-bold py-3.5 rounded-xl hover:bg-red-700 transition shadow-md text-lg">
                        পোস্ট করুন
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==========================================
         Firebase Script
    ========================================== -->
    <script>
        // ১. আপনার Firebase Config এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyCrziU51OfAfmlAQlvv3EWK5j9xkbMWV34",
  authDomain: "dharla-blood-bank.firebaseapp.com",
  projectId: "dharla-blood-bank",
  storageBucket: "dharla-blood-bank.firebasestorage.app",
  messagingSenderId: "110091910831",
  appId: "1:110091910831:web:c92cab6085da9bbea11e5a",
  measurementId: "G-ECW1EBHDSG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const requestGrid = document.getElementById('requestGrid');

        // ২. Modal Open/Close Functions
        function openRequestModal() {
            document.getElementById('requestModal').style.display = 'flex';
        }
        function closeRequestModal() {
            document.getElementById('requestModal').style.display = 'none';
        }

        // ৩. Form Submit Logic (Save to Firebase)
        document.getElementById('bloodRequestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'পোস্ট হচ্ছে...';
            btn.disabled = true;

            const requestData = {
                patientName: document.getElementById('patientName').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                bloodAmount: document.getElementById('bloodAmount').value,
                dateTime: document.getElementById('dateTime').value,
                disease: document.getElementById('disease').value,
                hospitalName: document.getElementById('hospitalName').value,
                contactPhone: document.getElementById('contactPhone').value,
                timestamp: Date.now() // ডেটা সর্টিং এর জন্য সময় সেভ করা
            };

            db.ref('blood_requests').push(requestData)
            .then(() => {
                alert('আপনার আবেদনটি সফলভাবে পোস্ট করা হয়েছে।');
                document.getElementById('bloodRequestForm').reset();
                closeRequestModal();
                btn.innerHTML = 'পোস্ট করুন';
                btn.disabled = false;
            })
            .catch((error) => {
                alert('সমস্যা হয়েছে: ' + error.message);
                btn.innerHTML = 'পোস্ট করুন';
                btn.disabled = false;
            });
        });

        // ৪. Fetch and Display Data
        db.ref('blood_requests').on('value', (snapshot) => {
            requestGrid.innerHTML = ''; 
            
            if (!snapshot.exists()) {
                requestGrid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10 font-noto">বর্তমানে কোনো জরুরি রক্তের আবেদন নেই।</p>';
                return;
            }

            // ডেটাগুলো অ্যারেতে নিয়ে রিভার্স (Reverse) করা হচ্ছে, যাতে নতুন পোস্ট আগে দেখায়
            let requestsArray = [];
            snapshot.forEach((childSnapshot) => {
                requestsArray.push(childSnapshot.val());
            });
            requestsArray.reverse();

            // কার্ড রেন্ডার করা
            requestsArray.forEach((req) => {
                const cardHTML = `
                <div class="bg-white border-l-4 border-blood rounded-xl p-5 shadow-sm hover:shadow-md transition relative">
                    <!-- Blood Group Badge -->
                    <div class="absolute top-4 right-4 bg-bloodLight text-blood font-bold text-lg px-3 py-1 rounded-lg">
                        ${req.bloodGroup}
                    </div>
                    
                    <h3 class="text-xl font-bold text-gray-800 mb-1 pr-16">${req.patientName}</h3>
                    <p class="text-sm font-semibold text-red-600 mb-4">${req.disease}</p>
                    
                    <div class="space-y-2 text-sm text-gray-600 font-noto mb-5">
                        <p class="flex items-start gap-2">
                            <span class="mt-0.5">🩸</span> <strong>পরিমাণ:</strong> ${req.bloodAmount}
                        </p>
                        <p class="flex items-start gap-2">
                            <span class="mt-0.5">⏰</span> <strong>প্রয়োজন:</strong> ${req.dateTime}
                        </p>
                        <p class="flex items-start gap-2">
                            <span class="mt-0.5">🏥</span> <strong>হাসপাতাল:</strong> ${req.hospitalName}
                        </p>
                    </div>
                    
                    <div class="pt-4 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-xs text-gray-400">জরুরি যোগাযোগ করুন:</span>
                        <a href="tel:${req.contactPhone}" class="bg-blood text-white font-bold px-4 py-2 rounded-lg hover:bg-red-700 transition flex items-center gap-1.5 shadow-sm text-sm">
                            📞 ${req.contactPhone}
                        </a>
                    </div>
                </div>`;
                
                requestGrid.innerHTML += cardHTML;
            });
        });
    </script>
    <footer class="mt-12 py-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-400 font-noto">
            © ২০২৬ আমার বিদ্যানন্দ. সর্বস্বত্ব সংরক্ষিত। 
            <a href="admin-requests.html" class="text-gray-300 hover:text-red-500 transition ml-2" title="Admin Login">
                🔒
            </a>
        </p>
    </footer>
</body>
</html>
