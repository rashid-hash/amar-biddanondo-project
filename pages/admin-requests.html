<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রক্তের আবেদন ম্যানেজমেন্ট | এডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; background-color: #f3f4f6; }
        .bg-blood { background-color: #dc2626; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body class="p-4 md:p-6">

    <div id="loginSection" class="max-w-md mx-auto bg-white rounded-2xl shadow-md overflow-hidden mt-10">
        <div class="bg-blood text-white p-6 text-center">
            <h2 class="text-2xl font-bold">🔒 রিকোয়েস্ট এডমিন লগইন</h2>
            <p class="text-sm opacity-90 mt-1">শুধুমাত্র অনুমোদিত ব্যক্তিদের জন্য</p>
        </div>
        <form id="loginForm" class="p-8 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">ইমেইল</label>
                <input type="email" id="loginEmail" required placeholder="admin@dharla.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">পাসওয়ার্ড</label>
                <input type="password" id="loginPassword" required placeholder="********" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-blood text-white font-bold py-3.5 rounded-xl hover:bg-red-700 transition shadow-md">
                লগইন করুন
            </button>
            <p id="loginError" class="text-red-500 text-sm text-center hidden mt-2">ইমেইল বা পাসওয়ার্ড ভুল হয়েছে!</p>
        </form>
    </div>

    <div id="adminSection" class="hidden max-w-5xl mx-auto space-y-6">
        
        <div class="bg-white rounded-2xl shadow-sm p-4 flex justify-between items-center border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800">🚨 রক্তের আবেদন ম্যানেজমেন্ট</h2>
            <div class="flex gap-2">
                <a href="admin-main.html" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-100 transition">ডোনার এডমিন</a>
                <button onclick="logoutAdmin()" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-100 hover:text-red-600 transition">
                    লগআউট
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <div class="bg-gray-50 border-b border-gray-100 px-6 py-4 flex justify-between items-center">
                <h3 class="font-bold text-gray-700 text-lg">📋 বর্তমান রক্তের আবেদনসমূহ</h3>
            </div>
            <div class="p-0 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase border-b border-gray-100">
                            <th class="px-6 py-3 font-semibold">রোগীর নাম ও সমস্যা</th>
                            <th class="px-6 py-3 font-semibold">গ্রুপ ও পরিমাণ</th>
                            <th class="px-6 py-3 font-semibold">হাসপাতাল ও সময়</th>
                            <th class="px-6 py-3 font-semibold">নাম্বার</th>
                            <th class="px-6 py-3 font-semibold text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="requestListBody" class="text-sm text-gray-700">
                        <tr><td colspan="5" class="text-center py-4 text-gray-400">লোড হচ্ছে...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="editModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full">
            <div class="bg-gray-100 border-b border-gray-200 px-6 py-4 flex justify-between items-center rounded-t-2xl">
                <h3 class="font-bold text-gray-800 text-lg">✏️ আবেদন সংশোধন করুন</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            </div>
            <form id="editForm" class="p-6 space-y-4">
                <input type="hidden" id="editKey">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">রোগীর নাম *</label>
                        <input type="text" id="editPatientName" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">রক্তের গ্রুপ *</label>
                        <select id="editBloodGroup" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">রক্তের পরিমাণ *</label>
                        <input type="text" id="editBloodAmount" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">কবে ও কখন লাগবে? *</label>
                        <input type="text" id="editDateTime" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">রোগের নাম বা সমস্যা *</label>
                    <input type="text" id="editDisease" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">হাসপাতালের নাম ও ঠিকানা *</label>
                    <input type="text" id="editHospitalName" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">যোগাযোগের মোবাইল নাম্বার *</label>
                    <input type="tel" id="editContactPhone" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeEditModal()" class="w-1/2 bg-gray-200 text-gray-700 font-bold py-2.5 rounded-lg hover:bg-gray-300 transition">বাতিল</button>
                    <button type="submit" id="updateBtn" class="w-1/2 bg-emerald-600 text-white font-bold py-2.5 rounded-lg hover:bg-emerald-700 transition">আপডেট করুন</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Firebase Config (আপনার কোড বসান)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCrziU51OfAfmlAQlvv3EWK5j9xkbMWV34",
  authDomain: "dharla-blood-bank.firebaseapp.com",
  projectId: "dharla-blood-bank",
  storageBucket: "dharla-blood-bank.firebasestorage.app",
  messagingSenderId: "110091910831",
  appId: "1:110091910831:web:c92cab6085da9bbea11e5a",
  measurementId: "G-ECW1EBHDSG"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ==========================================
        // 2. Authentication Logic
        // ==========================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                loadRequests(); // Load list
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('adminSection').classList.add('hidden');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            
            btn.innerHTML = 'অপেক্ষা করুন...';
            err.classList.add('hidden');

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    btn.innerHTML = 'লগইন করুন';
                    document.getElementById('loginForm').reset();
                })
                .catch(() => {
                    btn.innerHTML = 'লগইন করুন';
                    err.classList.remove('hidden');
                });
        });

        function logoutAdmin() { auth.signOut(); }

        // ==========================================
        // 3. Load Requests Logic
        // ==========================================
        function loadRequests() {
            const listBody = document.getElementById('requestListBody');
            
            db.ref('blood_requests').on('value', (snapshot) => {
                listBody.innerHTML = '';
                
                if (!snapshot.exists()) {
                    listBody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">কোনো রক্তের আবেদন নেই</td></tr>';
                    return;
                }

                // Reverse array to show newest first
                let requestsArray = [];
                snapshot.forEach((child) => {
                    requestsArray.push({ key: child.key, data: child.val() });
                });
                requestsArray.reverse();

                requestsArray.forEach((item) => {
                    const req = item.data;
                    const key = item.key;
                    
                    const row = `
                        <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition">
                            <td class="px-6 py-4">
                                <span class="font-bold text-gray-800 block">${req.patientName}</span>
                                <span class="text-xs text-red-500 font-semibold">${req.disease}</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-xs font-bold mr-1">${req.bloodGroup}</span>
                                <span class="text-xs text-gray-600">${req.bloodAmount}</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-xs text-gray-800 block">🏥 ${req.hospitalName}</span>
                                <span class="text-xs text-gray-500">⏰ ${req.dateTime}</span>
                            </td>
                            <td class="px-6 py-4 text-sm font-medium text-gray-700">${req.contactPhone}</td>
                            <td class="px-6 py-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="openEditModal('${key}')" class="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition shadow-sm border border-emerald-100">
                                        এডিট
                                    </button>
                                    <button onclick="deleteRequest('${key}')" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-500 hover:text-white transition shadow-sm border border-red-100">
                                        ডিলিট
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    listBody.innerHTML += row;
                });
            });
        }

        // ==========================================
        // 4. Edit & Delete Logic
        // ==========================================
        function openEditModal(key) {
            db.ref('blood_requests/' + key).once('value', (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('editKey').value = key;
                    document.getElementById('editPatientName').value = data.patientName;
                    document.getElementById('editBloodGroup').value = data.bloodGroup;
                    document.getElementById('editBloodAmount').value = data.bloodAmount;
                    document.getElementById('editDateTime').value = data.dateTime;
                    document.getElementById('editDisease').value = data.disease;
                    document.getElementById('editHospitalName').value = data.hospitalName;
                    document.getElementById('editContactPhone').value = data.contactPhone;
                    
                    document.getElementById('editModal').style.display = 'flex';
                }
            });
        }

        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const key = document.getElementById('editKey').value;
            const btn = document.getElementById('updateBtn');
            btn.innerHTML = 'আপডেট হচ্ছে...';

            const updatedData = {
                patientName: document.getElementById('editPatientName').value,
                bloodGroup: document.getElementById('editBloodGroup').value,
                bloodAmount: document.getElementById('editBloodAmount').value,
                dateTime: document.getElementById('editDateTime').value,
                disease: document.getElementById('editDisease').value,
                hospitalName: document.getElementById('editHospitalName').value,
                contactPhone: document.getElementById('editContactPhone').value
            };

            db.ref('blood_requests/' + key).update(updatedData)
            .then(() => {
                alert('আবেদনটি সফলভাবে আপডেট করা হয়েছে!');
                closeEditModal();
                btn.innerHTML = 'আপডেট করুন';
            })
            .catch((error) => {
                alert('আপডেট করতে সমস্যা হয়েছে: ' + error.message);
                btn.innerHTML = 'আপডেট করুন';
            });
        });

        function deleteRequest(key) {
            if (confirm("আপনি কি নিশ্চিত যে এই আবেদনটি ডিলিট করতে চান? (রক্ত পাওয়া গেলে ডিলিট করে দিন)")) {
                db.ref('blood_requests/' + key).remove().catch((error) => {
                    alert('ডিলিট করতে সমস্যা হয়েছে: ' + error.message);
                });
            }
        }
    </script>
</body>
</html>
